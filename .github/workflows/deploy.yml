name: Deploy to CyberPanel VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build, upload, and restart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Upload files by SSH
        uses: easingthemes/ssh-deploy@v5.1.0
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_USER: ${{ secrets.SSH_USER }}
          REMOTE_PORT: ${{ secrets.SSH_PORT }}
          SOURCE: ./
          TARGET: ${{ secrets.SSH_TARGET_DIR }}
          ARGS: -rlgoDzvc -i --delete
          EXCLUDE: /.git/, /.github/, /node_modules/, /.next/, /.env, /.env.local, /.env.*.local

      - name: Install, build, and restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd "${{ secrets.SSH_TARGET_DIR }}"
            npm ci
            npm run build
            pm2 describe edulink >/dev/null 2>&1 && pm2 restart edulink || pm2 start npm --name edulink -- start
            pm2 save
